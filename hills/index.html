<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>DOOM HILLS — first person (PSX)</title>
<style>
  :root { --ink:#cfcabf; }
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:100%; height:100%; overflow:hidden; background:#000; }
  body { font-family: "Times New Roman", Georgia, serif; color:var(--ink); cursor:default; }
  #game { position:fixed; inset:0; display:block; width:100vw; height:100vh; image-rendering:pixelated; }

  .overlay { position:fixed; inset:0; display:flex; align-items:center; justify-content:center;
             flex-direction:column; text-align:center; z-index:10; }
  .hidden { display:none !important; }

  @keyframes flick { 0%,92%,100%{opacity:1} 93%{opacity:.2} 95%{opacity:.9} 97%{opacity:.3} }

  /* efeitos de tela (não são HUD) */
  #damage { position:fixed; inset:0; z-index:4; pointer-events:none; opacity:0;
            box-shadow:inset 0 0 200px 40px rgba(140,0,0,.9); transition:opacity .12s; }
  #flash { position:fixed; inset:0; z-index:7; pointer-events:none; opacity:0; background:#fff; }

  /* RAGE (berserk): tinta roxa na borda + indicador com barra de tempo */
  #ragetint { position:fixed; inset:0; z-index:4; pointer-events:none; opacity:0; transition:opacity .2s;
              box-shadow:inset 0 0 170px 28px rgba(150,40,255,.34); }
  body.raging #ragetint { opacity:1; }
  #rage { position:fixed; top:62px; left:50%; transform:translateX(-50%); z-index:6; pointer-events:none;
          font-family:"Courier New", monospace; text-align:center; opacity:0; transition:opacity .15s;
          color:#d98cff; text-shadow:0 0 12px #b050ff, 0 0 4px #000; }
  body.raging #rage { opacity:1; }
  #rage span { font-size:15px; letter-spacing:.34em; font-weight:700; }
  #rage i { display:block; width:130px; height:3px; margin:5px auto 0; background:rgba(217,140,255,.2); overflow:hidden; }
  #rage i::after { content:""; display:block; height:100%; width:100%; background:#c060ff; box-shadow:0 0 8px #c060ff;
                   transform-origin:left center; transform:scaleX(var(--rage,1)); }

  /* ---------- crosshair ---------- */
  #cross { position:fixed; left:50%; top:50%; transform:translate(-50%,-50%);
           z-index:5; width:16px; height:16px; pointer-events:none; opacity:.7; }
  #cross::before, #cross::after { content:""; position:absolute; background:rgba(232,226,212,.85); box-shadow:0 0 3px #000; }
  #cross::before { left:50%; top:0; width:2px; height:100%; margin-left:-1px; }
  #cross::after  { top:50%; left:0; height:2px; width:100%; margin-top:-1px; }

  /* ---------- HUD (Doom: vida / colete / munição) ---------- */
  #hud { position:fixed; left:0; right:0; bottom:0; z-index:6; pointer-events:none;
         display:flex; justify-content:space-between; align-items:flex-end;
         padding:12px 26px; font-family:"Courier New", monospace; }
  .stat { text-align:center; min-width:64px; }
  .stat .num { font-size:clamp(26px,5vw,46px); font-weight:700; line-height:1; color:#d8d2c6;
               text-shadow:0 0 10px #000, 1.5px 0 0 rgba(255,40,70,.35), -1.5px 0 0 rgba(40,200,255,.3); }
  .stat .lbl { font-size:10px; letter-spacing:.32em; color:#7c766b; margin-top:5px; }

  /* indicador de extermínio: fase atual + inimigos restantes */
  #wave { position:fixed; top:40px; left:50%; transform:translateX(-50%); z-index:6; pointer-events:none;
          font-family:"Courier New", monospace; font-size:13px; letter-spacing:.26em; color:#9a9486;
          text-transform:uppercase; text-shadow:0 0 8px #000; }
  #wave b { color:#d8d2c6; font-weight:700; }

  /* bússola estilo Call of Duty: fita de cardeais + blips vermelhos = inimigos (com fade nas pontas) */
  #compass { position:fixed; top:8px; left:50%; transform:translateX(-50%); z-index:6;
             width:300px; height:26px; pointer-events:none; opacity:.82;
             -webkit-mask-image:linear-gradient(90deg, transparent, #000 7%, #000 93%, transparent);
             mask-image:linear-gradient(90deg, transparent, #000 7%, #000 93%, transparent); }

  /* combo / kill streak (estilo ultrakill), na direita; cor sobe de tier a cada abate */
  #combo { position:fixed; right:24px; top:34%; z-index:6; pointer-events:none; text-align:right;
           transform-origin:100% 50%; opacity:0; transition:opacity .12s; color:#e8e2d4; }
  #comboRank { font-family:"Courier New", monospace; font-size:14px; letter-spacing:.2em; font-weight:700;
               text-transform:uppercase; text-shadow:0 0 12px currentColor, 0 2px 6px #000; }
  #comboNum { font-family:"Courier New", monospace; font-size:clamp(34px,6vw,58px); font-weight:700; line-height:.85;
              text-shadow:0 0 16px currentColor, 0 3px 10px #000; }
  #comboBar { width:120px; height:3px; margin:6px 0 0 auto; background:rgba(207,202,191,.14); }
  #comboBar > i { display:block; height:100%; width:100%; background:currentColor; box-shadow:0 0 8px currentColor; }

  #pause, #dead, #win { background:rgba(2,3,4,.86); z-index:11; }
  #dead { background:radial-gradient(circle,#1a0303 0%, #000 80%); }
  .big { font-size:clamp(30px,7vw,72px); letter-spacing:.16em; font-weight:400; }
  #dead .big { color:#a11; text-shadow:0 0 30px #500; }
  #win .big { color:#d8d2c6; text-shadow:0 0 30px #243; }
  .hint { margin-top:1.6em; font-size:14px; letter-spacing:.2em; color:#8a8478; animation:flick 3s infinite; }
  .hint b { color:#bdb6a7; font-weight:400; }

  /* ---------- tela de score (game over) ---------- */
  #score { margin-top:1.7em; font-family:"Courier New", monospace; color:#cfcabf;
           display:flex; flex-direction:column; gap:.5em; width:min(80vw,330px); }
  .srow { display:flex; justify-content:space-between; align-items:baseline; gap:1.4em;
          font-size:clamp(12px,2.7vw,15px); letter-spacing:.16em; }
  .srow .slbl { color:#7c766b; text-transform:uppercase; }
  .srow .sval { color:#d8d2c6; font-weight:700; }
  .srow.score-main { font-size:clamp(20px,5vw,30px); letter-spacing:.1em;
                     border-bottom:1px solid rgba(207,202,191,.16); padding-bottom:.45em; margin-bottom:.15em; }
  .srow.score-main .sval { color:#ff6a3a; text-shadow:0 0 16px rgba(255,80,40,.55); }
  .srow.best .sval { color:#ffd24a; }
  #sc-new { margin-top:.6em; text-align:center; color:#ffd24a; font-weight:700;
            letter-spacing:.34em; font-size:clamp(12px,3vw,16px);
            text-shadow:0 0 18px rgba(255,200,60,.75); animation:flick 1.1s infinite; }
  #dead-hint { animation:none; transition:opacity .4s; }   /* sem flicker: faz fade-in após o respiro */

  /* prompt de interação (porta / saída) */
  #open { position:fixed; left:50%; top:53%; transform:translateX(-50%); z-index:6;
          color:#e2dccd; letter-spacing:.34em; font-size:clamp(15px,2.6vw,20px); text-transform:uppercase;
          text-shadow:0 2px 8px #000; opacity:0; pointer-events:none; transition:opacity .12s; }
  #open::before { content:""; display:block; width:5px; height:5px; margin:0 auto 10px; border-radius:50%;
                  background:rgba(226,220,205,.7); box-shadow:0 0 5px #000; }
  #open.show { opacity:1; }

  /* HUD do jogo fica oculto até a partida começar — não vaza atrás da intro no load */
  #cross, #hud, #compass, #wave { visibility:hidden; }
  body.playing #cross,
  body.playing #hud,
  body.playing #compass,
  body.playing #wave { visibility:visible; }

  #build { position:fixed; bottom:8px; right:10px; z-index:20; font-family:monospace;
           font-size:11px; color:#4a463f; letter-spacing:.1em; }
</style>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
    "./psx.js": "./psx.js?v=38",
    "./world.js": "./world.js?v=38",
    "./player.js": "./player.js?v=38",
    "./entities.js": "./entities.js?v=38",
    "./weapon.js": "./weapon.js?v=38",
    "./audio.js": "./audio.js?v=38",
    "./boot.js": "./boot.js?v=38",
    "./touch.js": "./touch.js?v=38",
    "./crt.js": "./crt.js?v=38",
    "./main.js": "./main.js?v=38"
  }
}
</script>
</head>
<body>
  <canvas id="game"></canvas>

  <!-- efeitos de tela -->
  <div id="damage"></div>
  <div id="ragetint"></div>
  <div id="flash"></div>

  <!-- crosshair -->
  <div id="cross"></div>

  <!-- prompt de interação (porta trancada / switch de saída) -->
  <div id="open">USE</div>

  <!-- HUD -->
  <div id="hud">
    <div class="stat"><div class="num" id="hp">100</div><div class="lbl">HEALTH</div></div>
    <div class="stat"><div class="num" id="armor">0</div><div class="lbl">ARMOR</div></div>
    <div class="stat"><div class="num" id="ammo">16</div><div class="lbl">SHELLS</div></div>
  </div>

  <!-- bússola (CoD): mostra a direção exata dos inimigos -->
  <canvas id="compass" width="600" height="52"></canvas>

  <!-- indicador de extermínio (fase / inimigos restantes) -->
  <div id="wave">LEVEL <b id="level">1</b> — <b id="left">0</b> LEFT</div>

  <!-- indicador de RAGE (berserk) com barra de tempo -->
  <div id="rage"><span>RAGE</span><i></i></div>

  <!-- combo / kill streak (estilo ultrakill) -->
  <div id="combo">
    <div id="comboRank">DOUBLE KILL</div>
    <div id="comboNum">x2</div>
    <div id="comboBar"><i></i></div>
  </div>

  <!-- PAUSE -->
  <div id="pause" class="overlay hidden">
    <div class="big">PAUSED</div>
    <div class="hint">click to <b>resume</b></div>
  </div>

  <!-- DEATH + SCORE -->
  <div id="dead" class="overlay hidden">
    <div class="big">YOU DIED</div>
    <div id="score">
      <div class="srow score-main"><span class="slbl">Score</span><span class="sval" id="sc-score">0</span></div>
      <div class="srow"><span class="slbl">Kills</span><span class="sval" id="sc-kills">0</span></div>
      <div class="srow"><span class="slbl">Level</span><span class="sval" id="sc-level">1</span></div>
      <div class="srow best"><span class="slbl">Best</span><span class="sval" id="sc-best">0</span></div>
      <div id="sc-new" class="hidden">NEW BEST</div>
    </div>
    <div class="hint" id="dead-hint">tap or press <b>any key</b></div>
  </div>

  <!-- VICTORY -->
  <div id="win" class="overlay hidden">
    <div class="big">LEVEL CLEARED</div>
    <div class="hint">press <b>R</b> (or tap) to play again</div>
  </div>

  <div id="build">BUILD 38</div>

  <script type="module">import './main.js';</script>
</body>
</html>
