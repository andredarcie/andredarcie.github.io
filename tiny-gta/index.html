<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GTA Santo André</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bowlby+One+SC&family=IBM+Plex+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --pink:#ff2e88; --cyan:#19e3ff; --cream:#ffe9c9; --gold:#ffd24a;
    --ink:#14091f; --blue:#3e7bff;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;overflow:hidden;background:var(--ink);
    font-family:'IBM Plex Mono',monospace;color:var(--cream);user-select:none}
  canvas#game{display:block;width:100%;height:100%}

  /* ---------- camadas retrô ---------- */
  .scanlines{position:fixed;inset:0;pointer-events:none;z-index:30;opacity:.035;
    background:repeating-linear-gradient(0deg,#000 0 1px,transparent 1px 3px)}
  .vignette{position:fixed;inset:0;pointer-events:none;z-index:29;
    background:radial-gradient(ellipse at 50% 45%,transparent 68%,rgba(20,10,40,.28) 100%)}

  /* ---------- HUD ---------- */
  #hud{position:fixed;inset:0;pointer-events:none;z-index:40;display:none}
  .panel{background:rgba(16,6,30,.62);border:2px solid var(--pink);
    box-shadow:0 0 14px rgba(255,46,136,.35), inset 0 0 22px rgba(255,46,136,.08);
    border-radius:10px;backdrop-filter:blur(3px)}
  #topleft{position:absolute;top:18px;left:18px;padding:10px 16px}
  #money{font-family:'Bowlby One SC';font-size:30px;color:var(--gold);
    text-shadow:2px 2px 0 #7a3a00,0 0 16px rgba(255,210,74,.5);letter-spacing:1px;line-height:1}
  #sub{font-size:12px;color:var(--cyan);margin-top:4px;letter-spacing:2px}
  #topright{position:absolute;top:18px;right:18px;padding:10px 16px;text-align:right}
  #stars{font-size:26px;letter-spacing:5px;line-height:1}
  #stars .s{color:#3a2a4d;text-shadow:none;transition:color .2s;display:inline-block}
  #stars .s.on{color:var(--gold);text-shadow:0 0 12px rgba(255,210,74,.9);
    animation:starpulse .7s ease-in-out infinite}
  @keyframes starpulse{50%{text-shadow:0 0 22px rgba(255,210,74,1);transform:scale(1.18)}}
  #wantedtag{font-family:'Bowlby One SC';font-size:13px;color:var(--pink);letter-spacing:3px;
    margin-top:3px;visibility:hidden;animation:blink 1s steps(2) infinite}
  @keyframes blink{50%{opacity:.25}}
  #speedo{position:absolute;right:18px;bottom:18px;padding:10px 18px;text-align:right;display:none}
  #kmh{font-family:'Bowlby One SC';font-size:38px;color:var(--cyan);
    text-shadow:2px 2px 0 #003a4d,0 0 18px rgba(25,227,255,.55);line-height:1}
  #carname{font-size:11px;color:var(--pink);letter-spacing:2px;margin-top:4px}
  #mapwrap{position:absolute;left:18px;bottom:18px;padding:7px}
  #minimap{display:block;border-radius:5px}
  #prompt{position:absolute;left:50%;bottom:96px;transform:translateX(-50%);
    padding:8px 18px;font-size:14px;letter-spacing:2px;color:var(--cream);display:none}
  #prompt b{color:var(--gold)}
  #msg{position:absolute;left:50%;top:84px;transform:translateX(-50%);
    font-family:'Bowlby One SC';font-size:24px;color:var(--cream);letter-spacing:2px;
    text-shadow:2px 2px 0 #000,0 0 18px rgba(255,46,136,.7);opacity:0;transition:opacity .25s;
    white-space:nowrap;text-align:center}
  #bigtext{position:absolute;left:50%;top:42%;transform:translate(-50%,-50%) scale(.7);
    font-family:'Bowlby One SC';font-size:96px;letter-spacing:6px;opacity:0;
    transition:opacity .35s,transform .35s;white-space:nowrap}
  #bigtext.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
  #pauseov{position:fixed;inset:0;z-index:45;display:none;align-items:center;justify-content:center;
    background:rgba(10,2,20,.6);font-family:'Bowlby One SC';font-size:64px;color:var(--cyan);
    letter-spacing:8px;text-shadow:0 0 24px rgba(25,227,255,.7)}

  /* ---------- tela título ---------- */
  #title{position:fixed;inset:0;z-index:50;display:flex;flex-direction:column;
    align-items:center;justify-content:center;cursor:pointer;
    background:
      radial-gradient(ellipse at 50% 118%, rgba(255,217,160,.75), transparent 55%),
      linear-gradient(180deg,#2e7fd9 0%,#5aa7e8 40%,#a8d8f0 68%,#ffc98a 100%)}
  #title::before{content:"";position:absolute;inset:0;pointer-events:none;opacity:.5;
    background:repeating-linear-gradient(0deg,transparent 0 46px,rgba(255,255,255,.14) 46px 48px)}
  #logo{font-family:'Bowlby One SC';font-size:clamp(64px,13vw,150px);line-height:.92;
    transform:skewX(-7deg) rotate(-2deg);text-align:center;color:var(--cream);
    text-shadow:4px 4px 0 var(--pink),8px 8px 0 #5a0e3a,0 0 50px rgba(255,46,136,.55)}
  #logo small{display:block;font-size:.24em;color:var(--cyan);letter-spacing:.6em;
    text-shadow:2px 2px 0 #073a6b,0 0 22px rgba(25,227,255,.8);margin-top:8px}
  #controls{display:grid;grid-template-columns:auto auto;gap:7px 22px;margin-top:42px;
    font-size:14px;background:rgba(20,9,31,.55);padding:18px 26px;border:2px solid var(--cyan);
    border-radius:12px;box-shadow:0 0 18px rgba(25,227,255,.35)}
  #controls b{color:var(--gold);font-weight:700}
  #play{margin-top:34px;font-family:'Bowlby One SC';font-size:26px;letter-spacing:5px;
    color:var(--ink);background:var(--gold);padding:12px 38px;border-radius:8px;
    box-shadow:0 0 28px rgba(255,210,74,.7),4px 4px 0 #7a3a00;animation:pulse 1.1s ease-in-out infinite}
  @keyframes pulse{50%{transform:scale(1.06)}}
  #best{margin-top:18px;font-size:13px;letter-spacing:2px;color:#14091f;font-weight:700}
  #credit{position:absolute;bottom:16px;font-size:11px;letter-spacing:2px;color:rgba(20,9,31,.65);font-weight:700}

  /* ---------- bloco de missão ---------- */
  #missionblock{position:absolute;left:18px;top:100px;max-width:270px;padding:10px 14px;display:none}
  #mission-label{font-size:10px;letter-spacing:3px;color:var(--pink);margin-bottom:5px;
    font-family:'Bowlby One SC'}
  #mission-title{font-family:'Bowlby One SC';font-size:14px;color:var(--gold);
    text-shadow:1px 1px 0 #7a3a00,0 0 12px rgba(255,210,74,.4);letter-spacing:1px;
    margin-bottom:6px;line-height:1.2}
  #mission-desc{font-size:11px;color:var(--cream);line-height:1.5;letter-spacing:.5px;opacity:.88}
  #mission-reward{margin-top:7px;font-size:11px;color:var(--cyan);letter-spacing:2px}
  #mission-reward span{color:var(--gold);font-weight:700}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div class="vignette"></div><div class="scanlines"></div>

<div id="hud">
  <div id="topleft" class="panel">
    <div id="money">$250</div>
    <div id="sub">ENTREGAS: 0</div>
  </div>
  <div id="topright" class="panel">
    <div id="stars"><span class="s">★</span><span class="s">★</span><span class="s">★</span><span class="s">★</span><span class="s">★</span></div>
    <div id="wantedtag">PROCURADO</div>
  </div>
  <div id="speedo" class="panel"><div id="kmh">0</div><div id="carname">A PÉ</div></div>
  <div id="mapwrap" class="panel"><canvas id="minimap" width="170" height="170"></canvas></div>
  <div id="prompt" class="panel"></div>
  <div id="msg"></div>
  <div id="bigtext"></div>
  <div id="missionblock" class="panel">
    <div id="mission-label">◆ MISSÃO ATUAL</div>
    <div id="mission-title"></div>
    <div id="mission-desc"></div>
    <div id="mission-reward">RECOMPENSA: <span id="mission-val"></span></div>
  </div>
</div>
<div id="pauseov">PAUSA</div>

<div id="title">
  <div id="logo">GTA<small>SANTO ANDRÉ</small></div>
  <div id="controls">
    <span><b>W A S D</b></span><span>dirigir / andar</span>
    <span><b>SHIFT</b></span><span>correr (a pé)</span>
    <span><b>ESPAÇO</b></span><span>freio de mão</span>
    <span><b>E</b></span><span>entrar / sair do carro</span>
    <span><b>H</b></span><span>buzina</span>
    <span><b>P</b></span><span>pausa</span>
  </div>
  <div id="play">CLIQUE PARA JOGAR</div>
  <div id="best"></div>
  <div id="credit">PEGUE AS ENTREGAS ◆ FUJA DA POLÍCIA ◆ NÃO SEJA PRESO</div>
</div>

<script type="module">
import * as THREE from 'three';

/* ============================== BASE ============================== */
const N=8, CELL=44, ROAD=14, BLOCK=30, SIDE=4, HALF=N*CELL/2;     // 366m de cidade
const GROUND=N*CELL+ROAD, BOUND=HALF+ROAD/2-2;
const nodeX=i=>i*CELL-HALF;
const rand=(a,b)=>a+Math.random()*(b-a);
const irand=(a,b)=>Math.floor(rand(a,b+1));
const pick=a=>a[Math.floor(Math.random()*a.length)];
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const wrapA=a=>{while(a>Math.PI)a-=2*Math.PI;while(a<-Math.PI)a+=2*Math.PI;return a};

const canvas=document.getElementById('game');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth,innerHeight);
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.25;

const scene=new THREE.Scene();
scene.fog=new THREE.Fog(0xcfe2ee,120,430);
const camera=new THREE.PerspectiveCamera(62,innerWidth/innerHeight,.1,2000);
camera.position.set(0,60,120);

addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});

/* ---------- céu de fim de tarde ---------- */
{
  const c=document.createElement('canvas');c.width=16;c.height=512;
  const x=c.getContext('2d');
  const g=x.createLinearGradient(0,0,0,512);
  g.addColorStop(0,'#2e7fd9');g.addColorStop(.45,'#5aa7e8');
  g.addColorStop(.7,'#a8d8f0');g.addColorStop(.86,'#ffe7c4');g.addColorStop(1,'#fff4dd');
  x.fillStyle=g;x.fillRect(0,0,16,512);
  const t=new THREE.CanvasTexture(c);t.colorSpace=THREE.SRGBColorSpace;
  const sky=new THREE.Mesh(new THREE.SphereGeometry(900,24,16),
    new THREE.MeshBasicMaterial({map:t,side:THREE.BackSide,fog:false}));
  scene.add(sky);
  // sol
  const sc=document.createElement('canvas');sc.width=128;sc.height=128;
  const sx=sc.getContext('2d');
  const sg=sx.createRadialGradient(64,64,8,64,64,64);
  sg.addColorStop(0,'rgba(255,244,210,1)');sg.addColorStop(.45,'rgba(255,200,130,.9)');
  sg.addColorStop(1,'rgba(255,160,90,0)');
  sx.fillStyle=sg;sx.fillRect(0,0,128,128);
  const st=new THREE.CanvasTexture(sc);st.colorSpace=THREE.SRGBColorSpace;
  const sun=new THREE.Sprite(new THREE.SpriteMaterial({map:st,fog:false,depthWrite:false}));
  sun.scale.set(300,300,1);sun.position.set(-320,330,-680);
  scene.add(sun);
}

/* ---------- luzes ---------- */
const hemi=new THREE.HemisphereLight(0xbfdfff,0x8a8078,1.05);scene.add(hemi);
const sunDir=new THREE.Vector3(-.45,.9,-.55).normalize();
const dlight=new THREE.DirectionalLight(0xfff1d6,2.2);
dlight.castShadow=true;
dlight.shadow.mapSize.set(2048,2048);
dlight.shadow.camera.left=-95;dlight.shadow.camera.right=95;
dlight.shadow.camera.top=95;dlight.shadow.camera.bottom=-95;
dlight.shadow.camera.far=420;dlight.shadow.bias=-.0015;
scene.add(dlight);scene.add(dlight.target);

/* ---------- oceano ao redor ---------- */
{
  const sea=new THREE.Mesh(new THREE.CircleGeometry(1400,40),
    new THREE.MeshStandardMaterial({color:0x2e9ec4,roughness:.3,metalness:.2}));
  sea.rotation.x=-Math.PI/2;sea.position.y=-.6;scene.add(sea);
}

/* ---------- nuvens ---------- */
const clouds=[];
{
  const c=document.createElement('canvas');c.width=256;c.height=128;
  const x=c.getContext('2d');
  for(let k=0;k<14;k++){
    const r=rand(18,42),px=rand(40,216),py=rand(45,86);
    const g2=x.createRadialGradient(px,py,2,px,py,r);
    g2.addColorStop(0,'rgba(255,255,255,.85)');g2.addColorStop(1,'rgba(255,255,255,0)');
    x.fillStyle=g2;x.fillRect(0,0,256,128);
  }
  const t=new THREE.CanvasTexture(c);t.colorSpace=THREE.SRGBColorSpace;
  for(let k=0;k<10;k++){
    const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:t,transparent:true,
      opacity:rand(.45,.8),fog:false,depthWrite:false}));
    const s=rand(90,170);sp.scale.set(s,s*.45,1);
    sp.position.set(rand(-500,500),rand(110,175),rand(-500,500));
    sp.userData.v=rand(1.5,3.5);
    scene.add(sp);clouds.push(sp);
  }
}

/* ============================== CIDADE ============================== */
const solids=[];                      // AABBs estáticos {x0,x1,z0,z1}
const parks=new Set();
while(parks.size<6){const i=irand(0,N-1),j=irand(0,N-1);if(Math.abs(i-4)+Math.abs(j-4)>1)parks.add(i+'_'+j);}
const isPark=(i,j)=>parks.has(i+'_'+j);

/* ---------- textura do chão (asfalto, calçadas, faixas) ---------- */
const groundCv=document.createElement('canvas');groundCv.width=2048;groundCv.height=2048;
{
  const x=groundCv.getContext('2d'), s=2048/GROUND, M=v=>(v+GROUND/2)*s;
  x.fillStyle='#54545f';x.fillRect(0,0,2048,2048);
  // quarteirões: calçada + miolo
  for(let i=0;i<N;i++)for(let j=0;j<N;j++){
    const x0=nodeX(i)+ROAD/2, z0=nodeX(j)+ROAD/2;
    x.fillStyle='#b3acb8';
    x.fillRect(M(x0),M(z0),BLOCK*s,BLOCK*s);
    x.fillStyle=isPark(i,j)?'#5fae62':'#9a93a2';
    x.fillRect(M(x0+SIDE),M(z0+SIDE),(BLOCK-2*SIDE)*s,(BLOCK-2*SIDE)*s);
    if(isPark(i,j)){ // trilhas do parque
      x.strokeStyle='#d8c79a';x.lineWidth=1.4*s;
      x.beginPath();x.moveTo(M(x0+SIDE),M(z0+BLOCK/2));x.lineTo(M(x0+BLOCK-SIDE),M(z0+BLOCK/2));
      x.moveTo(M(x0+BLOCK/2),M(z0+SIDE));x.lineTo(M(x0+BLOCK/2),M(z0+BLOCK-SIDE));x.stroke();
    }
  }
  // linhas centrais amarelas + bordas brancas
  for(let i=0;i<=N;i++){
    const r=nodeX(i);
    for(let j=0;j<N;j++){
      const a=nodeX(j)+ROAD/2+2.5, b=nodeX(j+1)-ROAD/2-2.5;
      x.fillStyle='#f0bd2e';
      x.fillRect(M(r-.55),M(a),.32*s,(b-a)*s); x.fillRect(M(r+.23),M(a),.32*s,(b-a)*s);
      x.fillRect(M(a),M(r-.55),(b-a)*s,.32*s); x.fillRect(M(a),M(r+.23),(b-a)*s,.32*s);
      x.fillStyle='rgba(240,240,245,.7)';
      x.fillRect(M(r-ROAD/2+.5),M(a),.22*s,(b-a)*s); x.fillRect(M(r+ROAD/2-.72),M(a),.22*s,(b-a)*s);
      x.fillRect(M(a),M(r-ROAD/2+.5),(b-a)*s,.22*s); x.fillRect(M(a),M(r+ROAD/2-.72),(b-a)*s,.22*s);
    }
  }
  // faixas de pedestre nos cruzamentos
  x.fillStyle='rgba(235,235,240,.75)';
  for(let i=0;i<=N;i++)for(let j=0;j<=N;j++){
    const cx=nodeX(i), cz=nodeX(j);
    for(let k=-2;k<=2;k++){
      x.fillRect(M(cx+k*2.4-.7),M(cz-ROAD/2-2.2),1.4*s,1.6*s);
      x.fillRect(M(cx+k*2.4-.7),M(cz+ROAD/2+.6),1.4*s,1.6*s);
      x.fillRect(M(cx-ROAD/2-2.2),M(cz+k*2.4-.7),1.6*s,1.4*s);
      x.fillRect(M(cx+ROAD/2+.6),M(cz+k*2.4-.7),1.6*s,1.4*s);
    }
  }
  // sujeira / ruído
  for(let k=0;k<5000;k++){
    x.fillStyle=`rgba(${irand(120,200)},${irand(120,190)},${irand(130,200)},.1)`;
    x.fillRect(Math.random()*2048,Math.random()*2048,irand(2,7),irand(2,7));
  }
  const gt=new THREE.CanvasTexture(groundCv);gt.colorSpace=THREE.SRGBColorSpace;
  gt.anisotropy=renderer.capabilities.getMaxAnisotropy();
  const ground=new THREE.Mesh(new THREE.PlaneGeometry(GROUND,GROUND),
    new THREE.MeshStandardMaterial({map:gt,roughness:.95}));
  ground.rotation.x=-Math.PI/2;ground.receiveShadow=true;scene.add(ground);
}

/* ---------- texturas de janelas ---------- */
const facadePalette=['#f2d4a8','#e8b8c8','#bfe0d8','#f4e3c2','#cfd9ea','#f0c9a0','#dfe6d2','#e6cfe0'];
function windowTexPair(base){
  const c=document.createElement('canvas');c.width=128;c.height=256;
  const e=document.createElement('canvas');e.width=128;e.height=256;
  const cx=c.getContext('2d'), ex=e.getContext('2d');
  cx.fillStyle=base;cx.fillRect(0,0,128,256);
  ex.fillStyle='#000';ex.fillRect(0,0,128,256);
  for(let r=0;r<16;r++)for(let q=0;q<8;q++){
    const wx=q*16+4, wy=r*16+3, lit=Math.random()<.12;
    if(lit){
      const col=pick(['#ffe9b0','#fff3cc']);
      cx.fillStyle=col;cx.fillRect(wx,wy,8,10);
      ex.fillStyle=col;ex.fillRect(wx,wy,8,10);
    }else{
      cx.fillStyle=pick(['#7fb2d9','#92c4e4','#6ea3cc','#a4cfe8']);cx.fillRect(wx,wy,8,10);
    }
  }
  const mk=cv=>{const t=new THREE.CanvasTexture(cv);t.colorSpace=THREE.SRGBColorSpace;
    t.wrapS=t.wrapT=THREE.RepeatWrapping;return t};
  return {map:mk(c),emis:mk(e)};
}
const texVariants=facadePalette.map(windowTexPair);
const roofMat=new THREE.MeshStandardMaterial({color:0xa39aa8,roughness:1});

/* ---------- prédios ---------- */
const neonColors=[0xff2e88,0x19e3ff,0x9dff2e,0xffb52e];
function addBuilding(cx,cz,w,d){
  const dist=Math.hypot(cx,cz);
  const h=clamp(rand(7,17)+Math.max(0,1-dist/200)*rand(8,30),7,46);
  const v=pick(texVariants);
  const map=v.map.clone(), emis=v.emis.clone();
  const rep=[w/17.6,h/48], off=[Math.random(),Math.random()];
  map.repeat.set(...rep);map.offset.set(...off);map.needsUpdate=true;
  emis.repeat.set(...rep);emis.offset.set(...off);emis.needsUpdate=true;
  const side=new THREE.MeshStandardMaterial({map,emissiveMap:emis,emissive:0xffe9b0,
    emissiveIntensity:.3,roughness:.9});
  const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),[side,side,roofMat,roofMat,side,side]);
  m.position.set(cx,h/2,cz);m.castShadow=true;m.receiveShadow=true;scene.add(m);
  solids.push({x0:cx-w/2,x1:cx+w/2,z0:cz-d/2,z1:cz+d/2});
  if(h>20&&Math.random()<.45){ // letreiro neon
    const nh=h*rand(.35,.55);
    const neon=new THREE.Mesh(new THREE.BoxGeometry(.5,nh,.5),
      new THREE.MeshBasicMaterial({color:pick(neonColors)}));
    const sgn=Math.random()<.5?1:-1;
    if(Math.random()<.5)neon.position.set(cx+sgn*(w/2+.3),h*.55,cz+rand(-d/4,d/4));
    else neon.position.set(cx+rand(-w/4,w/4),h*.55,cz+sgn*(d/2+.3));
    scene.add(neon);
  }
}
const palmLeafMat=new THREE.MeshStandardMaterial({color:0x3aa856,roughness:1});
const palmTrunkMat=new THREE.MeshStandardMaterial({color:0x96704e,roughness:1});
function addPalm(x,z){
  const g=new THREE.Group(), h=rand(4,6);
  const tr=new THREE.Mesh(new THREE.CylinderGeometry(.16,.26,h,5),palmTrunkMat);
  tr.position.y=h/2;tr.castShadow=true;g.add(tr);
  for(let k=0;k<6;k++){
    const leaf=new THREE.Mesh(new THREE.BoxGeometry(2.4,.08,.55),palmLeafMat);
    leaf.position.y=h;leaf.rotation.y=k*Math.PI/3;leaf.rotation.z=-.42;
    leaf.geometry.translate?.(0,0,0);leaf.translateX(1.0);leaf.castShadow=true;g.add(leaf);
  }
  g.position.set(x,0,z);scene.add(g);
}
for(let i=0;i<N;i++)for(let j=0;j<N;j++){
  const x0=nodeX(i)+ROAD/2+SIDE, z0=nodeX(j)+ROAD/2+SIDE, inner=BLOCK-2*SIDE; // 22m
  if(isPark(i,j)){
    for(let k=0;k<7;k++)addPalm(x0+rand(1,inner-1),z0+rand(1,inner-1));
    continue;

let AC=null,engine=null,siren=null,hornG=null,master=null,screechG=null,heliG=null;
function initAudio(){
  if(AC)return;
  AC=new (window.AudioContext||window.webkitAudioContext)();
  master=AC.createGain();master.gain.value=.5;master.connect(AC.destination);
  const o=AC.createOscillator();o.type='sawtooth';
  const f=AC.createBiquadFilter();f.type='lowpass';f.frequency.value=620;
  const g=AC.createGain();g.gain.value=0;
  o.connect(f);f.connect(g);g.connect(master);o.start();engine={o,g};
  const s=AC.createOscillator();s.type='triangle';
  const sg=AC.createGain();sg.gain.value=0;
  s.connect(sg);sg.connect(master);s.start();siren={o:s,g:sg};
  hornG=AC.createGain();hornG.gain.value=0;hornG.connect(master);
  for(const fr of[392,494]){
    const h=AC.createOscillator();h.type='square';h.frequency.value=fr;
    const hg=AC.createGain();hg.gain.value=.5;h.connect(hg);hg.connect(hornG);h.start();
  }
  // ruído branco compartilhado: cantada de pneu + helicóptero
  const nb=AC.createBuffer(1,AC.sampleRate,AC.sampleRate);
  const nd=nb.getChannelData(0);
  for(let i=0;i<nd.length;i++)nd[i]=Math.random()*2-1;
  const ns=AC.createBufferSource();ns.buffer=nb;ns.loop=true;
  const bp=AC.createBiquadFilter();bp.type='bandpass';bp.frequency.value=950;bp.Q.value=1.2;
  screechG=AC.createGain();screechG.gain.value=0;
  ns.connect(bp);bp.connect(screechG);screechG.connect(master);
  const lp=AC.createBiquadFilter();lp.type='lowpass';lp.frequency.value=170;
  heliG=AC.createGain();heliG.gain.value=0;
  ns.connect(lp);lp.connect(heliG);heliG.connect(master);
  ns.start();
}
function thud(v){
  if(!AC)return;
  const len=Math.floor(AC.sampleRate*.14);
  const b=AC.createBuffer(1,len,AC.sampleRate),d=b.getChannelData(0);
  for(let i=0;i<len;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/len,2);
  const src=AC.createBufferSource();src.buffer=b;
  const f=AC.createBiquadFilter();f.type='lowpass';f.frequency.value=260+v*30;
  const g=AC.createGain();g.gain.value=clamp(.15+v*.04,.15,.8);
  src.connect(f).connect(g).connect(master);src.start();
}
function blip(freqs,dur=.09,type='sine',vol=.18){
  if(!AC)return;
  freqs.forEach((fr,k)=>{
    const o=AC.createOscillator();o.type=type;o.frequency.value=fr;
    const g=AC.createGain();g.gain.value=0;
    o.connect(g).connect(master);
    const t0=AC.currentTime+k*dur;
    g.gain.setValueAtTime(0,t0);g.gain.linearRampToValueAtTime(vol,t0+.015);
    g.gain.exponentialRampToValueAtTime(.001,t0+dur);
    o.start(t0);o.stop(t0+dur+.02);
  });
}

  if(delivery){
    const pulse=2.5+Math.sin(state.time*5)*1.2;
    mm.fillStyle='#ffd24a';mm.beginPath();
    mm.arc(M(delivery.x),M(delivery.z),pulse,0,7);mm.fill();
  }
  const pp=playerPos(),h=state.mode==='car'?cur.heading:player.heading;
  mm.save();mm.translate(M(pp.x),M(pp.z));mm.rotate(Math.atan2(Math.sin(h),Math.cos(h)));
  mm.fillStyle='#19e3ff';mm.beginPath();
  mm.moveTo(0,4.5);mm.lineTo(-3,-3.5);mm.lineTo(3,-3.5);mm.closePath();mm.fill();mm.restore();
}

/* ============================== FÍSICA ============================== */
function collideStatics(p,r){
  let hit=false;
  for(const b of solids){
    const cx=clamp(p.x,b.x0,b.x1),cz=clamp(p.z,b.z0,b.z1);
    const dx=p.x-cx,dz=p.z-cz,d2=dx*dx+dz*dz;
    if(d2<r*r){
      if(d2<1e-6){
        const pl=p.x-b.x0,pr=b.x1-p.x,pt=p.z-b.z0,pb=b.z1-p.z,m=Math.min(pl,pr,pt,pb);
        if(m===pl)p.x=b.x0-r;else if(m===pr)p.x=b.x1+r;
        else if(m===pt)p.z=b.z0-r;else p.z=b.z1+r;
      }else{
        const d=Math.sqrt(d2);p.x=cx+dx/d*r;p.z=cz+dz/d*r;
      }
      hit=true;
    }
  }
  if(p.x<-BOUND){p.x=-BOUND;hit=true} if(p.x>BOUND){p.x=BOUND;hit=true}
  if(p.z<-BOUND){p.z=-BOUND;hit=true} if(p.z>BOUND){p.z=BOUND;hit=true}
  return hit;
}
function playerPos(){return state.mode==='car'?cur.g.position:player.g.position;}
function addWanted(n,why){
  const before=Math.floor(state.wanted);
  state.wanted=clamp(state.wanted+n,0,5);state.lastCrime=state.time;
  if(Math.floor(state.wanted)>before){
    blip([880,660,880],0.08,'square',.14);
    message(why||('PROCURADO ★'+Math.floor(state.wanted)),'var(--pink)');
  }
}

/* ============================== AÇÕES ============================== */
function nearestCar(maxD){
  let best=null,bd=maxD,kind=null;
  const pp=player.g.position;
  for(const c of idleCars){
    const d=pp.distanceTo(c.g.position);if(d<bd){bd=d;best=c;kind='idle';}
  }
  for(const t of traffic){
    const d=pp.distanceTo(t.g.position);if(d<bd){bd=d;best=t;kind='traffic';}
  }
  for(const c of cops){
    const d=pp.distanceTo(c.g.position);if(d<bd){bd=d;best=c;kind='cop';}
  }
  return best?{c:best,kind}:null;
}
function enterCar(){
  const f=nearestCar(3.6);if(!f)return;
  const{c,kind}=f;
  if(kind==='idle'){idleCars.splice(idleCars.indexOf(c),1);cur=c;}
  else if(kind==='traffic'){
    traffic.splice(traffic.indexOf(c),1);
    const p=trafficPos({...c,t:c.t});
    cur={g:c.g,heading:Math.atan2(p.dx,p.dz),speed:0,name:c.name,police:false};
    addWanted(1,'CARRO ROUBADO!');spawnTraffic();
  }else{
    cops.splice(cops.indexOf(c),1);
    cur={g:c.g,heading:c.heading,speed:0,name:'VIATURA 47',police:true};
    addWanted(2,'VIATURA ROUBADA!');
  }
  state.mode='car';player.g.visible=false;
  hudCar.textContent=cur.name;hudSpeedo.style.display='block';
  blip([330,440],0.07,'triangle',.12);
}
function exitCar(){
  cur.speed=0;
  const right=new THREE.Vector3(Math.cos(cur.heading),0,-Math.sin(cur.heading));
  player.g.position.copy(cur.g.position).addScaledVector(right,-2.2);
  collideStatics(player.g.position,.5);
  player.g.position.y=0;player.g.visible=true;player.heading=cur.heading;
  idleCars.push(cur);cur=null;state.mode='foot';hudSpeedo.style.display='none';
}
function startCut(text,col,fn){
  state.mode='cut';state.cutT=2.6;state.cutFn=fn;bigText(text,col);
  if(cur)cur.speed=0;
}
function getBusted(){
  startCut('BUSTED','#3e7bff',()=>{
    state.money=Math.floor(state.money*.85);state.wanted=0;state.bustT=0;
    for(const c of cops)scene.remove(c.g);cops.length=0;
    if(cur){idleCars.push(cur);cur=null;}
    player.g.visible=true;player.g.position.set(nodeX(2)+4,0,nodeX(2)+4);
    state.mode='foot';hudSpeedo.style.display='none';
    message('VOCÊ FOI SOLTO. COMPORTE-SE.','var(--cyan)');
  });
}
function getWasted(){
  startCut('WASTED','#ff2e88',()=>{
    state.money=Math.floor(state.money*.8);state.wanted=0;state.bustT=0;
    for(const c of cops)scene.remove(c.g);cops.length=0;
    player.g.visible=true;player.g.position.set(nodeX(6)+4,0,nodeX(6)+4);
    state.mode='foot';hudSpeedo.style.display='none';
    message('ALTA DO HOSPITAL. CUIDADO AÍ.','var(--cyan)');
  });
}

/* ============================== UPDATES ============================== */
function updateCar(dt){
  const th=(keys['KeyW']||keys['ArrowUp']?1:0)-(keys['KeyS']||keys['ArrowDown']?1:0);
  const st=(keys['KeyA']||keys['ArrowLeft']?1:0)-(keys['KeyD']||keys['ArrowRight']?1:0);
  const hb=keys['Space'];
  const MAX=32;
  if(th>0)cur.speed+=16*dt*Math.max(.15,1-cur.speed/MAX);
  else if(th<0)cur.speed-=(cur.speed>0?30:9)*dt;
  cur.speed*=Math.exp(-(hb?2.2:.45)*dt);
  cur.speed=clamp(cur.speed,-11,MAX);
  cur.heading+=st*2.0*dt*clamp(cur.speed/11,-1,1)*(hb?1.55:1);
  const p=cur.g.position;
  p.x+=Math.sin(cur.heading)*cur.speed*dt;
  p.z+=Math.cos(cur.heading)*cur.speed*dt;
  if(collideStatics(p,1.5)){
    if(Math.abs(cur.speed)>6){thud(Math.abs(cur.speed));state.shake=Math.min(.6,Math.abs(cur.speed)*.02);}
    cur.speed*=-.25;
  }
  cur.g.rotation.y=cur.heading;
  cur.g.rotation.z=THREE.MathUtils.lerp(cur.g.rotation.z,-st*clamp(cur.speed/MAX,0,1)*.06,10*dt);
  spinWheels(cur.g,cur.speed,dt,st);
  const tail=cur.g.userData.tailM;
  if(tail)tail.color.setHex(cur.speed<-.5?0xffd6d6:(th<0||hb)?0xff4444:0xa01515);
}
function updateFoot(dt){
  const f=(keys['KeyW']||keys['ArrowUp']?1:0)-(keys['KeyS']||keys['ArrowDown']?1:0);
  const s=(keys['KeyA']||keys['ArrowLeft']?1:0)-(keys['KeyD']||keys['ArrowRight']?1:0);
  if(f||s){
    const camF=new THREE.Vector3();camera.getWorldDirection(camF);camF.y=0;camF.normalize();
    const camR=new THREE.Vector3(-camF.z,0,camF.x);
    const mv=new THREE.Vector3().addScaledVector(camF,f).addScaledVector(camR,-s).normalize();
    const spd=keys['ShiftLeft']||keys['ShiftRight']?9:5.2;
    player.g.position.addScaledVector(mv,spd*dt);
    player.heading=Math.atan2(mv.x,mv.z);
    player.bob+=dt*spd*1.8;
    player.g.position.y=Math.abs(Math.sin(player.bob))*.09;
  }else player.g.position.y*=.8;
  collideStatics(player.g.position,.5);
  player.g.rotation.y=player.heading;
}
function updateTraffic(dt){
  for(const t of traffic){
    const pp=playerPos();
    const pos=trafficPos(t);
    // freia se algo na frente
    const ax=pos.x+pos.dx*6,az=pos.z+pos.dz*6;
    let blocked=Math.hypot(ax-pp.x,az-pp.z)<4.5;
    if(!blocked)for(const o of traffic){
      if(o!==t&&Math.hypot(ax-o.g.position.x,az-o.g.position.z)<3.5){blocked=true;break;}
    }
    if(t.brakeT>0){t.brakeT-=dt;blocked=true;}
    const target=blocked?0:8.5;
    t.speed+=(target-t.speed)*4*dt;
    t.t+=t.speed*dt/CELL;
    if(t.t>=1){
      const opts=neighborNodes(t.B[0],t.B[1]).filter(n=>!(n[0]===t.A[0]&&n[1]===t.A[1]));
      t.A=t.B;t.B=opts.length?pick(opts):t.A;t.t=0;
    }
    const np=trafficPos(t);
    t.g.position.set(np.x,0,np.z);
    const want=Math.atan2(np.dx,np.dz);
    t.heading+=wrapA(want-t.heading)*Math.min(1,10*dt);
    t.g.rotation.y=t.heading;
    spinWheels(t.g,t.speed,dt);
    // colisão com o jogador
    if(state.mode==='car'){
      const d=t.g.position.distanceTo(cur.g.position);
      if(d<2.9){
        const push=new THREE.Vector3().subVectors(t.g.position,cur.g.position).setY(0).normalize();
        cur.g.position.addScaledVector(push,-(2.9-d)*.6);
        if(Math.abs(cur.speed)>8){addWanted(.25);thud(Math.abs(cur.speed));state.shake=.3;}
        cur.speed*=.6;t.brakeT=2;
      }
    }else if(state.mode==='foot'&&t.speed>6.5){
      if(t.g.position.distanceTo(player.g.position)<1.8)getWasted();
    }
  }
}
function updatePeds(dt){
  const pp=playerPos();
  const danger=state.mode==='car'&&Math.abs(cur.speed)>6;
  for(const p of peds){
    if(p.state==='fly'){
      p.g.position.addScaledVector(p.vel,dt);
      p.vel.y-=22*dt;p.g.rotation.x+=9*dt;
      if(p.g.position.y<.35&&p.vel.y<0){
        p.g.position.y=.35;p.state='dead';p.t=0;
        p.g.rotation.set(-Math.PI/2,p.g.rotation.y,0);
      }
      continue;
    }
    if(p.state==='dead'){
      p.t+=dt;
      if(p.t>3)setOpacity(p.g,Math.max(0,1-(p.t-3)/.8));
      if(p.t>3.8){ // renasce em outro lugar
        p.block=[irand(0,N-1),irand(0,N-1)];p.corner=irand(0,3);p.state='walk';
        p.g.rotation.set(0,0,0);setOpacity(p.g,1);
        const c=pedCorner(p);p.g.position.set(c[0]+rand(-2,2),.0,c[1]+rand(-2,2));
      }
      continue;
    }
    // atropelamento
    if(danger&&p.g.position.distanceTo(cur.g.position)<2.3){
      p.state='fly';
      const dir=new THREE.Vector3(Math.sin(cur.heading),0,Math.cos(cur.heading));
      p.vel.copy(dir).multiplyScalar(cur.speed*.4).add(new THREE.Vector3(rand(-2,2),rand(5,8),rand(-2,2)));
      state.comboN=state.time-state.lastHit<4?state.comboN+1:1;
      state.lastHit=state.time;
      spawnDrop(p.g.position.x,p.g.position.z,irand(20,80)*state.comboN);
      addWanted(1,'ATROPELAMENTO! ★'+Math.min(5,Math.floor(state.wanted+1)));
      if(state.comboN>1)message('COMBO x'+state.comboN+'!','var(--pink)');
      thud(Math.abs(cur.speed));state.shake=.35;
      continue;
    }
    // fugir de carro vindo
    let tgt;
    if(danger&&p.g.position.distanceTo(cur.g.position)<11){
      p.state='flee';
      tgt=new THREE.Vector3().subVectors(p.g.position,cur.g.position).setY(0).normalize()
        .multiplyScalar(20).add(p.g.position);
    }else{
      if(p.state==='flee')p.state='walk';
      const c=pedCorner(p);tgt=new THREE.Vector3(c[0],0,c[1]);
    }
    const d=new THREE.Vector3().subVectors(tgt,p.g.position);d.y=0;
    const dist=d.length();
    if(p.state==='walk'&&dist<1){p.corner=(p.corner+p.dir+4)%4;continue;}
    d.normalize();
    const spd=p.state==='flee'?5.5:p.speed;
    p.g.position.addScaledVector(d,spd*dt);
    collideStatics(p.g.position,.4);
    p.g.rotation.y=Math.atan2(d.x,d.z);
    p.t+=dt*spd*2.2;
    p.g.position.y=Math.abs(Math.sin(p.t))*.07;
  }
}
function updateCops(dt){
  // contratar / dispensar
  const want=Math.floor(state.wanted);
  if(cops.length<want&&cops.length<5&&Math.random()<dt*.8)spawnCop();
  while(cops.length>want){const c=cops.pop();scene.remove(c.g);}
  const pp=playerPos();
  let minD=1e9;
  for(const c of cops){
    const p=c.g.position;
    const dx=pp.x-p.x,dz=pp.z-p.z,dist=Math.hypot(dx,dz);
    minD=Math.min(minD,dist);
    const desired=Math.atan2(dx,dz),diff=wrapA(desired-c.heading);
    if(c.backT>0){
      c.backT-=dt;c.speed+=(-8-c.speed)*3*dt;
      c.heading-=Math.sign(diff)*1.4*dt;
    }else{
      c.heading+=clamp(diff,-1,1)*2.5*dt*clamp(Math.abs(c.speed)/8+.25,0,1);
      const ts=dist>15?27:12;
      c.speed+=(ts-c.speed)*1.3*dt;
    }
    p.x+=Math.sin(c.heading)*c.speed*dt;
    p.z+=Math.cos(c.heading)*c.speed*dt;
    if(collideStatics(p,1.5)){c.speed*=.3;c.stuckT+=dt*3;}
    if(Math.abs(c.speed)<2.5)c.stuckT+=dt;else c.stuckT=Math.max(0,c.stuckT-dt*2);
    if(c.stuckT>1.2){c.backT=.9;c.stuckT=0;}
    c.g.rotation.y=c.heading;
    spinWheels(c.g,c.speed,dt,clamp(diff,-1,1));
    blinkBar(c.g);
    // batida no jogador
    if(state.mode==='car'){
      const d=p.distanceTo(cur.g.position);
      if(d<2.9){
        const push=new THREE.Vector3().subVectors(cur.g.position,p).setY(0).normalize();
        cur.g.position.addScaledVector(push,(2.9-d)*.7);
        cur.speed*=.75;c.speed*=.6;thud(8);state.shake=.35;
      }
    }else if(state.mode==='foot'&&Math.abs(c.speed)>7){
      if(p.distanceTo(player.g.position)<1.8){getWasted();return;}
    }
  }
  // prisão
  if(cops.length&&minD<6&&(state.mode==='foot'||Math.abs(cur.speed)<3.5)){
    state.bustT+=dt;
    if(state.bustT>.4)message('A POLÍCIA ESTÁ TE CERCANDO!','var(--blue)');
    if(state.bustT>1.8){getBusted();return;}
  }else state.bustT=Math.max(0,state.bustT-dt*2);
  // decaimento do nível de procurado
  if(state.wanted>0&&state.time-state.lastCrime>9&&(minD>70||!cops.length))
    state.wanted=Math.max(0,state.wanted-dt/5);
}
function updatePickups(dt){
  const pp=playerPos();
  for(let i=drops.length-1;i>=0;i--){
    const d=drops[i];d.t+=dt;
    d.g.rotation.y+=3*dt;d.g.position.y=.5+Math.sin(d.t*4)*.12;
    if(d.t>25){scene.remove(d.g);drops.splice(i,1);continue;}
    if(pp.distanceTo(d.g.position)<2.6){
      state.money+=d.val;blip([660,990],0.07,'sine',.15);
      scene.remove(d.g);drops.splice(i,1);saveBest();
    }
  }
  if(delivery){
    delivery.g.rotation.z+=2*dt;
    const sc=1+Math.sin(state.time*4)*.12;delivery.g.scale.set(sc,sc,1);
    // seta de navegação flutuando sobre o jogador
    navArrow.visible=true;
    navArrow.position.set(pp.x,4.4+Math.sin(state.time*3)*.25,pp.z);
    navArrow.lookAt(delivery.x,navArrow.position.y,delivery.z);
    if(Math.hypot(pp.x-delivery.x,pp.z-delivery.z)<3.2){
      const base=curMission?curMission.reward:150;
      const fast=Math.max(0,Math.round(120-(state.time-delivery.t0)*4));
      state.money+=base+fast;state.deliveries++;
      message(fast>0?`ENTREGA +$${base+fast} — BÔNUS RÁPIDO!`:`ENTREGA CONCLUÍDA  +$${base}`,'var(--gold)');
      blip([523,659,784,1047],0.09,'sine',.18);
      saveBest();spawnDelivery();
    }
  }
}
function updateCamera(dt){
  let tgt,heading,dist,h;
  if(state.mode==='car'||state.mode==='cut'&&cur){
    tgt=cur?cur.g.position:player.g.position;heading=cur?cur.heading:player.heading;dist=9.5;h=4.6;
  }else{tgt=player.g.position;heading=player.heading;dist=6;h=3.1;}
  const want=new THREE.Vector3(
    tgt.x-Math.sin(heading)*dist, tgt.y+h, tgt.z-Math.cos(heading)*dist);
  const k=1-Math.exp(-4.5*dt);
  camera.position.lerp(want,k);
  const tf=state.mode==='car'?62+Math.abs(cur.speed)/32*13:62;
  camera.fov+=(tf-camera.fov)*Math.min(1,5*dt);
  camera.updateProjectionMatrix();
  if(state.shake>0){
    camera.position.x+=rand(-1,1)*state.shake;
    camera.position.y+=rand(-1,1)*state.shake*.5;
    state.shake=Math.max(0,state.shake-dt*1.6);
  }
  camera.lookAt(tgt.x+Math.sin(heading)*3,tgt.y+1.6,tgt.z+Math.cos(heading)*3);
}
function updateHUD(dt){
  shownMoney+=(state.money-shownMoney)*Math.min(1,8*dt);
  if(Math.abs(shownMoney-state.money)<1)shownMoney=state.money;
  hudMoney.textContent='$'+Math.round(shownMoney);
  hudSub.textContent='ENTREGAS: '+state.deliveries;
  const w=Math.floor(state.wanted);
  hudStars.forEach((s,i)=>s.classList.toggle('on',i<w));
  hudWanted.style.visibility=w>0?'visible':'hidden';
  if(state.mode==='car')hudKmh.textContent=Math.abs(Math.round(cur.speed*3.6));
  if(msgT>0){msgT-=dt;if(msgT<=0)hudMsg.style.opacity=0;}
  // prompt de entrar no carro
  if(state.mode==='foot'&&nearestCar(3.6)){
    hudPrompt.innerHTML='<b>E</b> — PEGAR O CARRO';hudPrompt.style.display='block';
  }else hudPrompt.style.display='none';
}
function updateAudio(){
  if(!AC)return;
  if(engine){
    const sp=state.mode==='car'?Math.abs(cur.speed):0;
    engine.o.frequency.value=52+sp*6.5;
    engine.g.gain.value=state.mode==='car'?.028+sp/32*.035:0;
  }
  if(siren){
    siren.o.frequency.value=Math.floor(state.time*2.4)%2?640:860;
    const tgt=cops.length?.045:0;
    siren.g.gain.value+= (tgt-siren.g.gain.value)*.1;
  }
  if(hornG)hornG.gain.value=(state.mode==='car'&&keys['KeyH'])?.07:0;
  if(screechG)screechG.gain.value=
    (state.mode==='car'&&keys['Space']&&Math.abs(cur.speed)>7)?.12:0;
  if(heliG)heliG.gain.value=heli?(Math.floor(state.time*13)%2?.07:.015):0;
}

/* ============================== INPUT ============================== */
addEventListener('keydown',e=>{
  if(['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code))e.preventDefault();
  keys[e.code]=true;
  if(!state.started)return;
  if(e.code==='KeyP'){
    state.paused=!state.paused;
    document.getElementById('pauseov').style.display=state.paused?'flex':'none';
  }
  if(state.paused||state.mode==='cut')return;
  if(e.code==='KeyE'||e.code==='KeyF'){
    if(state.mode==='foot')enterCar();
    else if(state.mode==='car'&&Math.abs(cur.speed)<6)exitCar();
  }
});
addEventListener('keyup',e=>keys[e.code]=false);
if(best.money>0||best.deliveries>0)
  document.getElementById('best').textContent=
    `RECORDE: $${best.money} ◆ ${best.deliveries} ENTREGAS`;
document.getElementById('title').addEventListener('click',()=>{
  initAudio();AC.resume?.();
  document.getElementById('title').style.display='none';
  document.getElementById('hud').style.display='block';
  state.started=true;
  setMissionHUD();
  message('PEGUE O CARRO ROSA — APERTE E','var(--gold)');
});

/* ============================== LOOP ============================== */
const clock=new THREE.Clock();
function frame(){
  requestAnimationFrame(frame);
  const dt=Math.min(clock.getDelta(),.05);
  if(state.paused){renderer.render(scene,camera);return;}
  state.time+=dt;
  for(const c of clouds){
    c.position.x+=c.userData.v*dt;
    if(c.position.x>550)c.position.x=-550;
  }

  if(!state.started){ // câmera de demonstração atrás do título
    const a=state.time*.07;
    camera.position.set(Math.cos(a)*140,65,Math.sin(a)*140);
    camera.lookAt(0,6,0);
    updateTraffic(dt);updatePeds(dt);
    renderer.render(scene,camera);return;
  }
  if(state.mode==='cut'){
    state.cutT-=dt;
    if(state.cutT<=0){hideBig();const fn=state.cutFn;state.cutFn=null;fn&&fn();}
  }else if(state.mode==='car')updateCar(dt);
  else updateFoot(dt);

  updateTraffic(dt);
  updatePeds(dt);
  if(state.mode!=='cut')updateCops(dt);
  updateHeli(dt);
  updatePickups(dt);
  if(cur)blinkBar(cur.g);
  for(const c of idleCars)blinkBar(c.g);
  updateCamera(dt);
  updateHUD(dt);
  updateAudio();
  drawMinimap();

  // sombra acompanha o jogador
  const pp=playerPos();
  dlight.position.set(pp.x+sunDir.x*160,sunDir.y*160,pp.z+sunDir.z*160);
  dlight.target.position.set(pp.x,0,pp.z);

  renderer.render(scene,camera);
}
frame();
